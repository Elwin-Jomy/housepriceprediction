<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>House Price Prediction</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f3f3f3;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:420px;
            background:white;
            padding:40px 35px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            font-size:42px;
            margin-bottom:35px;
            color:#0B1736;
            font-weight:bold;
            line-height:1.2;
        }

        input{
            width:100%;
            padding:18px;
            margin-bottom:20px;
            border:1px solid #dcdcdc;
            border-radius:14px;
            font-size:18px;
            outline:none;
        }

        input:focus{
            border:2px solid #2F66E0;
        }

        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:14px;
            background:#2F66E0;
            color:white;
            font-size:22px;
            cursor:pointer;
        }

        button:hover{
            background:#1d56d6;
        }

        .prediction{
            margin-top:25px;
            text-align:center;
            font-size:24px;
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>House Price<br>Prediction</h1>

        <form action="/predict" method="POST">

            <input type="number" name="overall_qual" placeholder="Overall Quality" required>

            <input type="number" name="gr_liv_area" placeholder="Living Area (sq ft)" required>

            <input type="number" name="garage_cars" placeholder="Garage Cars" required>

            <input type="number" name="full_bath" placeholder="Bathrooms" required>

            <input type="number" name="year_built" placeholder="Year Built" required>

            <button type="submit">
                Predict Price
            </button>

        </form>

        <div class="prediction">
            {{ prediction_text }}
        </div>

    </div>

</body>

</html>
